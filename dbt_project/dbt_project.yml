name: 'dbt_project'
version: '1.0.0'
config-version: 2

# Must match the profile in ~/.dbt/profiles.yml and the DAG's ProfileConfig
profile: 'dbt_project'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_project:
    staging:
      +materialized: view
    gold:
      +materialized: table
